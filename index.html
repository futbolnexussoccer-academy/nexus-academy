                { id: 'l26', title: '3. El Juego Reducido', videoUrl: 'https://drive.google.com/file/d/1KbBH1Urg4jWdBizX7dyNnSvJGM-YheY3/preview', pdfUrl: 'https://drive.google.com/file/d/1G-Y3_jKMr0-Rmx8J-C7OmGaZhNEkTEQO/preview' },
                { id: 'l27', title: '4. Entr. individualizado. La Fuerza', videoUrl: 'https://drive.google.com/file/d/1jiNnjswIc6GIXb-s0KjRG8mR481rEVxO/preview', pdfUrl: 'https://drive.google.com/file/d/1jdpHdRidKR7Y7p3zvexugopSLCo_GsKs/preview' },
                { id: 'l28', title: '5. La Fuerza en el Portero', videoUrl: 'https://drive.google.com/file/d/1zBHiEIUTzJJgouhpE4t_i5A_Kysc01eW/preview', pdfUrl: 'https://drive.google.com/file/d/1ku4AM2zGb7vXc9mvWj0UmyK12MHKAMJ3/preview' },
                { id: 'l29', title: '6. Entrenamiento preventivo', videoUrl: 'https://drive.google.com/file/d/1Ek3TjcfYg6KLVs_S28l7d-hY6753yneo/preview', pdfUrl: 'https://drive.google.com/file/d/1kGcIHWTroR5gp2PhqpuzhOHxXXNDnfGx/preview' },
                { id: 'l30', title: '7. Cuantificación de las cargas. Microciclo semanal', videoUrl: 'https://drive.google.com/file/d/12QbF0_C9soJ01OHzBLTfGksKUvIc5xD0/preview', pdfUrl: 'https://drive.google.com/file/d/1ZQwSR9LGExjWYgTc556ZNTJ6B9bj9Jvo/preview' }
            ]},
            { id: 'm6', title: 'Módulo 6. Herramientas de Apoyo al Entrenador', lessons: [
                { id: 'l31', title: '1. Modelos de enseñanza', videoUrl: 'https://drive.google.com/file/d/1zyJd9m_qX7NIlH990K7bV3pXMPod-ajx/preview', pdfUrl: 'https://drive.google.com/file/d/1f2sUF_IPvFKiDKz796WxSV7J7jFxEKWM/preview' },
                { id: 'l32', title: '2. El proceso comunicativo', videoUrl: 'https://drive.google.com/file/d/1FlUWAE1Wkxdt5UXDX40eLCUg4irQwswl/preview', pdfUrl: 'https://drive.google.com/file/d/1bmwP-uj2GCflYih61CV3atVLP5xA246G/preview' },
                { id: 'l33', title: '3. El videoanálisis en el fútbol', videoUrl: 'https://drive.google.com/file/d/1BUK8JUByYCEEn-M7_M-FP6lrRVTZX6ro/preview', pdfUrl: 'https://drive.google.com/file/d/1SzronDyVTFbKB3p8jBmihkr6d1bFx7vu/preview' },
                { id: 'l34', title: '4. Los perfiles de Jugador y el Scouting', videoUrl: 'https://drive.google.com/file/d/1H9WeJNhUM5h7OMRHRzOlkFJe8prn94Q/preview', pdfUrl: 'https://drive.google.com/file/d/1lJP2-Fj6I9aDgCmIMXbtfN85zPaBpX1a/preview' }
            ]},
            { id: 'm7', title: 'Módulo 7. Academia y Clubes', lessons: [
                { id: 'l35', title: '1. Estructura de una Academia', videoUrl: 'https://drive.google.com/file/d/19PehQwEwuS35lW5i_Tk2lhwhCwcFiRvA/preview', pdfUrl: 'https://drive.google.com/file/d/1Ty_x8FAtlwlxGA7uOgNCbK5_eIULnoWV/preview' },
                { id: 'l36', title: '2. Academias. Ejemplos de éxito', videoUrl: 'https://drive.google.com/file/d/1lZzaz1UbUzbh-Jf74V9QUFhRtrW5EPjS/preview', pdfUrl: 'https://drive.google.com/file/d/1iwELXP3_qY10kkGE1ZKqvV4vDWFvoymz/preview' }
            ]}
        ];

        const courseDataGK = [
            { id: 'pm0', title: 'Módulo 0. El Perfil del Portero Nexus', lessons: [{ id: 'pl0', title: 'Evolución y Portero Moderno', videoUrl: '', pdfUrl: '' }] },
            { id: 'pm1', title: 'Módulo 1. Técnica Individual (Cajón 1)', lessons: [
                { id: 'pl1', title: 'Postura y Desplazamientos', videoUrl: '', pdfUrl: '' },
                { id: 'pl2', title: 'Blocajes y Desvíos', videoUrl: '', pdfUrl: '' }
            ]}
        ];

        const App = () => {
            const [isAuthed, setIsAuthed] = useState(false);
            const [isDemoUser, setIsDemoUser] = useState(false);
            const [isGKEdition, setIsGKEdition] = useState(false);
            const [studentName, setStudentName] = useState('');
            const [passInput, setPassInput] = useState('');
            const [activeModule, setActiveModule] = useState(null);
            const [currentData, setCurrentData] = useState(courseData);
            const [currentLesson, setCurrentLesson] = useState(null);
            const [contentType, setContentType] = useState('video');
            const [showModal, setShowModal] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [previewVideo, setPreviewVideo] = useState(null); // Nuevo estado para previsualización
            const [completedIds, setCompletedIds] = useState(() => {
                const saved = localStorage.getItem('nexus_final_v5');
                return new Set(saved ? JSON.parse(saved) : []);
            });

            const handleLogin = (e) => {
                if(e) e.preventDefault();
                if (passInput === "DEMO" && studentName.trim()) { 
                    setIsAuthed(true); setIsDemoUser(true); setIsGKEdition(false); 
                    setCurrentData(courseData); setCurrentLesson(courseData[0].lessons[0]);
                } else if (passInput === ACCESS_PASSWORD && studentName.trim()) { 
                    setIsAuthed(true); setIsDemoUser(false); setIsGKEdition(false);
                    setCurrentData(courseData); setCurrentLesson(courseData[0].lessons[0]);
                } else if (passInput === GK_PASSWORD && studentName.trim()) {
                    setIsAuthed(true); setIsDemoUser(false); setIsGKEdition(true);
                    setCurrentData(courseDataGK); setCurrentLesson(courseDataGK[0].lessons[0]);
                } else alert("Acceso Incorrecto");
            };

            const isLocked = (id) => {
                if (isGKEdition) return false;
                if (id === 'l0' || id === 'l1') return false;
                if (isDemoUser) return true;
                const flat = currentData.flatMap(m => m.lessons);
                const idx = flat.findIndex(l => l.id === id);
                return idx > 0 && !completedIds.has(flat[idx - 1].id);
            };

            const accentColor = isGKEdition ? 'var(--silver-primary)' : 'var(--gold-primary)';

            if (!isAuthed) return (
                <div className="gatekeeper-overlay">
                    <div className="premium-info-panel">
                        <h3>OFERTA FORMATIVA <span className="curriculum-label">PLAN 2026</span></h3>
                        <div className="course-row" onClick={() => setPreviewVideo({title: "Metodología y Entrenamiento", url: previews.metodologia})}>
                            <span className="status-badge" style={{background: 'var(--success-green)', color:'black'}}>ACTIVO</span>
                            <div className="course-name">Metodología y Entrenamiento 📺</div>
                        </div>
                        <div className="course-row" onClick={() => setPreviewVideo({title: "Porteros GK Edition", url: previews.porteros})}>
                            <span className="status-badge" style={{background: 'var(--gold-primary)', color:'black'}}>EN CONSTRUCCIÓN</span>
                            <div className="course-name">Porteros GK Edition 📺</div>
                        </div>
                        <div className="course-row" style={{opacity: 0.6}}>
                            <span className="status-badge" style={{background: '#333', color:'white'}}>PRÓXIMAMENTE</span>
                            <div className="course-name" style={{fontSize: '0.65rem', marginTop: '5px'}}>
                                • PF Edition (Prep. Física)<br/>
                                • Análisis de Vídeo Pro<br/>
                                • Coaching Deportivo<br/>
                                • Power Edition (Nutrición)
                            </div>
                        </div>
                    </div>

                    <div className="login-box">
                        <img src={LOGO} className="logo-img" alt="Logo" />
                        <h2 style={{color: '#D4AF37', margin: '10px 0 20px', fontSize: '1.2rem'}}>NEXUS UNIVERSITY</h2>
                        <div className="social-validation">
                            <p>Síguenos antes de entrar</p>
                            <div className="social-icons">
                                <a href="https://youtube.com/@nexussoccer2.0" target="_blank" className="social-link">
                                    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" className="social-icon-img" alt="YouTube" />
                                </a>
                                <a href="https://www.instagram.com/nexussoccer2.0" target="_blank" className="social-link">
                                    <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" className="social-icon-img" alt="Instagram" />
                                </a>
                            </div>
                        </div>
                        <form onSubmit={handleLogin}>
                            <input className="input-field" placeholder="Nombre y Apellido" onChange={e => setStudentName(e.target.value)} required />
                            <input className="input-field" type="password" placeholder="Clave Acceso" onChange={e => setPassInput(e.target.value)} required />
                            <button className="btn-action">ENTRAR AL CAMPUS</button>
                        </form>
                    </div>

                    {/* MODAL DE PREVISUALIZACIÓN DE VIDEO */}
                    {previewVideo && (
                        <div className="modal-overlay">
                            <div className="modal-content" style={{maxWidth: '600px'}}>
                                <span style={{position:'absolute',top:'15px',right:'20px',cursor:'pointer',fontSize:'1.5rem'}} onClick={()=>setPreviewVideo(null)}>×</span>
                                <div className="modal-title">{previewVideo.title}</div>
                                <div className="preview-frame">
                                    <iframe src={previewVideo.url} allow="autoplay"></iframe>
                                </div>
                                <button className="btn-action" style={{marginTop:'20px'}} onClick={()=>setPreviewVideo(null)}>CERRAR VISTA PREVIA</button>
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="app-wrapper">
                    <div className="watermark-layer">
                        {Array(30).fill(studentName).map((n, i) => (
                            <div key={i} className="wm-item">{n.toUpperCase()} - NEXUS ACADEMY</div>
                        ))}
                    </div>
                    
                    <button className="mobile-toggle" style={{background: accentColor}} onClick={() => setSidebarOpen(!sidebarOpen)}>
                        {sidebarOpen ? 'CERRAR X' : 'MENÚ ☰'}
                    </button>

                    <nav className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
                        <div className="sidebar-header">
                            <button className="logout-btn" onClick={() => setIsAuthed(false)}>SALIR ⎗</button>
                            <img src={LOGO} className="logo-img" />
                            <span style={{fontSize:'0.6rem', color: accentColor, letterSpacing:'2px', display:'block', marginTop:'5px'}}>{isGKEdition ? 'GK PRO EDITION' : 'ELITE COACH EDITION'}</span>
                        </div>
                        <div className="modules-container">
                            {currentData.map(m => (
                                <div key={m.id}>
                                    <button className="drawer-btn" onClick={() => setActiveModule(activeModule === m.id ? null : m.id)}>{m.title} <span>{activeModule === m.id ? '▾' : '▸'}</span></button>
                                    {activeModule === m.id && m.lessons.map(l => {
                                        const locked = isLocked(l.id);
                                        return <div key={l.id} className={`nav-link ${locked ? 'locked' : ''} ${currentLesson?.id === l.id ? 'active' : ''}`} style={currentLesson?.id === l.id ? {color: accentColor, borderLeftColor: accentColor} : {}} onClick={() => { if(!locked) { setCurrentLesson(l); setSidebarOpen(false); } }}>{completedIds.has(l.id) ? '✅ ' : (locked ? '🔒 ' : '○ ')} {l.title}</div>
                                    })}
                                </div>
                            ))}
                        </div>
                        <div className="footer-sidebar">
                            <a href={WA_LINK + "?text=Quiero%20el%20Curso%20Completo"} target="_blank" className="full-course-btn" style={{borderColor: accentColor}}>🔒 CURSO COMPLETO (197€)</a>
                            <div onClick={()=>setShowModal(true)} className="upgrade-link">🚀 NIVEL ÉLITE (400€)</div>
                        </div>
                    </nav>

                    <main className="main-area">
                        {currentLesson && (
                            <div style={{height: '100%', display: 'flex', flexDirection: 'column'}}>
                                <h2 style={{marginBottom: '10px', color: accentColor, fontSize:'0.9rem'}}>{currentLesson.title}</h2>
                                <div className="viewer-tabs">
                                    <button className={`tab-btn ${contentType === 'video' ? 'active' : ''}`} style={contentType === 'video' ? {background: accentColor} : {}} onClick={() => setContentType('video')}>VIDEO</button>
                                    <button className={`tab-btn ${contentType === 'pdf' ? 'active' : ''}`} style={contentType === 'pdf' ? {background: accentColor} : {}} onClick={() => setContentType('pdf')}>PDF</button>
                                </div>
                                <div className="content-frame">
                                    {currentLesson.videoUrl ? (
                                        <iframe src={contentType === 'video' ? currentLesson.videoUrl : currentLesson.pdfUrl} allow="autoplay"></iframe>
                                    ) : (
                                        <div style={{display:'flex', height:'100%', alignItems:'center', justifyContent:'center', color:'#555', textAlign:'center', padding:'20px'}}>Grabando sesión de Meet... Próximamente disponible.</div>
                                    )}
                                </div>
                                <div style={{textAlign: 'right'}}>
                                    <button className="btn-action" style={{padding: '8px 15px', fontSize: '0.7rem', width: 'auto'}} onClick={() => {
                                        const newSet = new Set(completedIds);
                                        if (newSet.has(currentLesson.id)) newSet.delete(currentLesson.id); else newSet.add(currentLesson.id);
                                        setCompletedIds(newSet);
                                        localStorage.setItem('nexus_final_v5', JSON.stringify([...newSet]));
                                    }}>{completedIds.has(currentLesson.id) ? 'DESMARCAR' : 'COMPLETADA ✅'}</button>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    {showModal && (
                        <div className="modal-overlay">
                            <div className="modal-content">
                                <span style={{position:'absolute',top:'15px',right:'20px',cursor:'pointer',fontSize:'1.5rem'}} onClick={()=>setShowModal(false)}>×</span>
                                <div className="modal-title">ELIGE TU PLAN</div>
                                <div className="plans-comparison">
                                    <div className="plan-card">
                                        <div className="plan-name">PLAN FULL</div>
                                        <div className="plan-price">197€</div>
                                        <span className="plan-feature">Acceso A TU RITMO</span>
                                        <span className="plan-feature">Sin HORARIOS</span>
                                        <span className="plan-feature">VIDEOS y PDFs 24/7</span>
                                        <a href={WA_LINK + "?text=Quiero%20el%20Curso%20Completo"} target="_blank" className="btn-action" style={{fontSize: '0.6rem', padding: '8px', textDecoration: 'none', display: 'block'}}>COMPRAR</a>
                                    </div>
                                    <div className="plan-card featured">
                                        <div className="plan-name">PLAN ÉLITE</div>
                                        <div className="plan-price">400€</div>
                                        <span className="plan-feature">8 Clases en Vivo</span>
                                        <span className="plan-feature">32 Horas FORMACIÓN</span>
                                        <span className="plan-feature">9 meses TUTORIA</span>
                                        <a href={WA_LINK + "?text=Reserva%20Elite"} target="_blank" className="btn-action" style={{fontSize: '0.6rem', padding: '8px', textDecoration: 'none', display: 'block'}}>RESERVAR</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
