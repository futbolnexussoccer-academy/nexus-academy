<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nexus Soccer Elite - Academy</title>
    <link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=1IpRAayL0zOpX6lBYy0Npy7HuivozRT1p&sz=w100">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        :root {
            --bg-deep: #0a0a0a;
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold-primary: #D4AF37;
            --gold-dark: #B8860B;
            --cyan-glow: #00e5ff;
            --success-green: #2ecc71;
            --text-main: #FAFAFA;
            --text-muted: #888888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; 
            height: -webkit-fill-available;
            overflow: hidden; 
            width: 100vw; 
        }
        
        /* LOGIN Y TABLÓN PREMIUM */
        .gatekeeper-overlay { 
            position: fixed; inset: 0; background: black; z-index: 10000; 
            display: flex; align-items: center; justify-content: center; padding: 20px; gap: 40px;
        }
        @media (max-width: 900px) { .gatekeeper-overlay { flex-direction: column; overflow-y: auto; justify-content: flex-start; padding-top: 40px; } }

        .premium-info-panel { 
            width: 100%; max-width: 360px; background: rgba(20, 20, 20, 0.8); 
            border: 1px solid var(--cyan-glow); border-radius: 25px; padding: 25px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15); backdrop-filter: blur(10px);
        }
        .premium-info-panel h3 { 
            color: var(--gold-primary); font-size: 0.85rem; font-weight: 700; 
            letter-spacing: 2px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .curriculum-label { font-size: 0.5rem; background: rgba(0, 229, 255, 0.2); color: var(--cyan-glow); padding: 2px 6px; border-radius: 4px; }
        .status-badge { font-size: 0.55rem; font-weight: 800; padding: 3px 8px; border-radius: 5px; display: inline-block; margin-bottom: 5px; }
        
        /* CURSOS CLICABLES */
        .course-row { margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .course-row:hover { transform: translateX(5px); }
        .course-name { font-size: 0.75rem; color: #eee; }
        .course-row:hover .course-name { color: var(--cyan-glow); }

        /* LOGIN BOX */
        .login-box { width: 100%; max-width: 380px; padding: 25px; background: #111; border: 1px solid var(--gold-primary); border-radius: 20px; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); }
        .logo-img { max-width: 70px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); margin-bottom: 5px; }
        .social-validation { margin: 10px 0 20px 0; padding-top: 10px; border-top: 1px solid #222; }
        .social-validation p { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .social-icons { display: flex; justify-content: center; gap: 20px; }
        .social-link { transition: transform 0.3s ease; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .social-icon-img { width: 28px; height: 28px; filter: grayscale(1) brightness(1.2); transition: 0.3s; }
        .social-link:hover .social-icon-img { filter: grayscale(0) brightness(1); }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 8px; outline: none; font-size: 16px; }
        .btn-action { background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark)); color: black; border: none; padding: 12px; border-radius: 25px; font-weight: 700; cursor: pointer; margin-top: 5px; width: 100%; transition: 0.3s; }

        .watermark-layer { position: fixed; inset: -50%; pointer-events: none; z-index: 99999; display: flex; flex-wrap: wrap; transform: rotate(-30deg); opacity: 0.10; justify-content: center; align-content: center; }
        .wm-item { margin: 60px; font-size: 1.2rem; font-weight: 900; color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); white-space: nowrap; }

        .app-wrapper { display: flex; height: 100%; width: 100vw; position: relative; }
        .sidebar { width: 300px; background: #111; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 5000; height: 100%; }
        .sidebar-header { padding: 15px; text-align: center; flex-shrink: 0; border-bottom: 1px solid var(--glass-border); position: relative; }
        .logout-btn { position: absolute; top: 10px; right: 10px; background: #222; border: none; color: #555; font-size: 0.5rem; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        
        .mobile-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 6000; background: var(--gold-primary); color: black; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 800; font-size: 0.75rem; }

        @media (max-width: 768px) {
            .mobile-toggle { display: block; }
            .sidebar { position: fixed; transform: translateX(-100%); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .main-area { padding-top: 70px !important; }
        }

        .modules-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .drawer-btn { width: 100%; padding: 12px 15px; background: transparent; border: none; color: #ccc; cursor: pointer; text-align: left; border-bottom: 1px solid #222; font-weight: 600; font-size: 0.7rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-link { padding: 10px 20px; color: var(--text-muted); cursor: pointer; font-size: 0.7rem; border-left: 2px solid transparent; }
        .nav-link.locked { opacity: 0.3; }
        .nav-link.active { color: var(--gold-primary); border-left: 2px solid var(--gold-primary); background: rgba(212, 175, 55, 0.05); }

        .main-area { flex: 1; padding: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .content-frame { flex: 1; background: black; border-radius: 12px; border: 1px solid #333; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .viewer-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(255, 255, 255, 0.03); color: var(--text-muted); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { background: var(--gold-primary); color: #000; border-color: var(--gold-primary); }

        /* BOTONES DE VENTA SIDEBAR */
        .footer-sidebar { padding: 12px; border-top: 1px solid #222; background: #111; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
        .full-course-btn { background: transparent; color: white; border: 1px solid var(--gold-primary); padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.7rem; text-align: center; text-decoration: none; transition: 0.3s; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .full-course-btn:hover { background: var(--gold-primary); color: black; }
        .upgrade-link { color: #fff; background: var(--success-green); text-decoration: none; font-weight: 800; font-size: 0.7rem; padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }

        /* MODALES CORREGIDOS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: #111; border: 2px solid var(--gold-primary); border-radius: 20px; max-width: 480px; width: 100%; padding: 30px; position: relative; }
        .modal-title { color: var(--gold-primary); font-size: 1.15rem; font-weight: 700; margin-bottom: 25px; text-align: center; letter-spacing: 1px; }
        
        .plans-comparison { display: flex; gap: 15px; margin-bottom: 15px; }
        .plan-card { flex: 1; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .plan-card.featured { border-color: var(--success-green); transform: scale(1.05); box-shadow: 0 0 20px rgba(46, 204, 113, 0.1); }
        
        .plan-name { font-size: 0.75rem; font-weight: 700; color: var(--gold-primary); margin-bottom: 8px; text-transform: uppercase; }
        .plan-price { font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; color: white; }
        
        /* AJUSTE SOLICITADO PARA LAS LETRAS REDONDEADAS */
        .plan-feature { 
            font-size: 0.75rem; 
            color: #ccc; 
            margin-bottom: 10px; 
            display: block; 
            line-height: 1.3; 
            font-weight: 400;
        }

        /* MODAL PREVISUALIZACION VIDEO */
        .preview-frame { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; border: 1px solid #333; overflow: hidden; margin-top: 10px; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
